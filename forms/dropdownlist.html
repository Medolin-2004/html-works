<!DOCTYPE html>
<html lang="en">
<head>
    <title>dropdownlist</title>
</head>
<body>
    <form>
          <!-- Label for the dropdown -->
        <label for="cars">Select a Car:</label>
        <!-- Dropdown list -->
        <select id="cars" name="cars">

            <!-- Dropdown options -->
            <option value="bmw">BMW</option>
            <option value="tata">Tata</option>
            <option value="honda">Honda</option>

        </select>
    </form>
</body>
</html>
