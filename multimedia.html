<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multimedia in HTML</title>
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: 40px auto;
    padding: 0 20px;
    background: #f4f6f8;
    color: #222;
  }
  h1 { color: #2c3e50; }
  section {
    background: #fff;
    padding: 20px;
    margin-bottom: 25px;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }
  video, audio, img {
    width: 100%;
    border-radius: 6px;
  }
  img { max-width: 100%; height: auto; }
</style>
</head>
<body>

<h1>HTML Multimedia Demo</h1>

<section>
  <h2>Video</h2>
  <video controls poster="https://via.placeholder.com/800x400?text=Video+Poster">
    <source src="movie.mp4" type="video/mp4">
    <source src="movie.ogg" type="video/ogg">
    Your browser does not support the video tag.
  </video>
</section>

<section>
  <h2>Audio</h2>
  <audio controls>
    <source src="audio.mp3" type="audio/mpeg">
    <source src="audio.ogg" type="audio/ogg">
    Your browser does not support the audio element.
  </audio>
</section>

<section>
  <h2>Image</h2>
  <img src="https://via.placeholder.com/800x400?text=Sample+Image" alt="Sample multimedia image">
</section>

<section>
  <h2>Embedded YouTube Video</h2>
  <iframe width="100%" height="400"
    src="https://www.youtube.com/embed/dQw4w9WgXcQ"
    title="YouTube video player"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>
</section>

</body>
</html>
