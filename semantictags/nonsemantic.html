<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Page Title -->
    <title>Div and Span Example</title>

</head>
<body>
    <!-- Div is a block-level container -->
    <div style="border:2px solid black; background-color:lightyellow; padding:15px;">

        <h2>Student Information</h2>

        <!-- Paragraph with span -->
        <p>
            Name:
            <!-- Span is an inline element used to style part of the text -->
            <span style="color:blue; font-weight:bold;">Medolin Christiyana</span>
        </p>
        <!-- Another paragraph with span -->
        <p>
            Department:
            <span style="color:green;">Computer Science and Engineering</span>
        </p>
        <!-- Another paragraph with span -->
     <p>
        CGP:
        <span style="color: red;">8.5</span>
     </p>

    </div>

</body>
</html>
