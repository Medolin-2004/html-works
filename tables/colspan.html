<!DOCTYPE html>
<html lang="en">
<head>
    <title>Grocery List</title>
</head>
<body>
    <table border="2">
        <!-- Table heading spans 3 columns -->
        <tr>
            <th colspan="3">Grocery List</th>
        </tr>
        <!-- Column headings -->
        <tr>
            <th>Item</th>
            <th>Quantity</th>
            <th>Price</th>
        </tr>
        <tr>
            <td>Rice</td>
            <td>5 kg</td>
            <td>₹300</td>
        </tr>
        <tr>
            <td>Milk</td>
            <td>2 Litres</td>
            <td>₹120</td>
        </tr>
        <tr>
            <td>Eggs</td>
            <td>12</td>
            <td>₹90</td>
        </tr>
    </table>
</body>
</html>
