<!DOCTYPE html>
<html lang="en">
<head>
    <title>Grocery List</title>
</head>
<body>
    <table border="2">
        <!-- First row -->
        <tr>
            <!-- Category spans two rows -->
            <td rowspan="2"><b>Fruits</b></td>
            <td>Apple</td>
            <td>2 kg</td>
        </tr>
        <!-- Second row -->
        <tr>
            <td>Banana</td>
            <td>1 dozen</td>
        </tr>
    </table>
</body>
</html>
