<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cricket Team Table</title>
</head>
<body>
    <!-- Table starts with border -->
    <table border="2">
        <!-- Table caption -->
        <caption><b>Cricket Team</b></caption>
        
        <tr> <!--table row-->
          <!-- Header row -->
            <th>Name</th>
            <th>Age</th>
            <th>Team</th>
        </tr>
        <tr>
            <td>Dhoni</td> <!--table column data-->
            <td>41</td>
            <td>CSK</td>
        </tr>
        <tr>
            <td>Virat</td>
            <td>34</td>
            <td>RCB</td>
        </tr>
        <tr>
            <td>KR</td>
            <td>30</td>
            <td>CSG</td>
        </tr>
    </table>
</body>
</html>
